<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法点心屋 (Magic Dessert Shop)</title>
    <style>
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.8);
            border: 2px solid #ccc;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            z-index: 100;
        }
        
        /* 音乐控制按钮 */
        .music-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #ffb74d;
            box-shadow: 0 4px 0 #ffb74d;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.1s;
        }
        .music-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }
        .music-btn.off {
            filter: grayscale(100%);
            opacity: 0.7;
        }

        :root {
            --brother-bg: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --sister-bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --transfer-bg: #fff9e6;
            --text-color: #4a4a4a;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* 防止长按选中文本 */
            -webkit-user-select: none;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--transfer-bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; /* 优化触摸体验 */
        }

        /* 哥哥区域 (上方，旋转180度面向哥哥) */
        #brother-zone {
            flex: 1;
            background: var(--brother-bg);
            transform: rotate(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 6px dashed #fff;
            padding: 10px;
        }

        /* 传送带 (中间) */
        #transfer-zone {
            height: 120px;
            background: var(--transfer-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 6px solid #ffcc80;
            border-bottom: 6px solid #ffcc80;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        /* 妹妹区域 (下方，面向妹妹) */
        #sister-zone {
            flex: 1;
            background: var(--sister-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 6px dashed #fff;
            padding: 10px;
        }

        h2 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        /* 食材网格 */
        .ingredients-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ingredient {
            width: 75px;
            height: 75px;
            font-size: 45px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #ddd;
            border: 4px solid #eee;
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
        }

        .ingredient.locked {
            opacity: 0.6;
            filter: grayscale(80%);
            cursor: not-allowed;
            box-shadow: 0 6px 0 #ccc;
        }

        .ingredient.active {
            border-color: #a8edea;
            box-shadow: 0 6px 0 #8ec5fc;
            animation: pulse 1.5s infinite;
        }
        .ingredient:active:not(.locked) {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent !important;
        }

        /* 动画：抖动（错误操作时） */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            50% { transform: translateX(5px) rotate(5deg); }
            75% { transform: translateX(-5px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.4s; }

        /* 动画：呼吸发光 */
        @keyframes pulse {
            0% { box-shadow: 0 6px 0 #8ec5fc, 0 0 0 0 rgba(168,237,234,0.8); }
            70% { box-shadow: 0 6px 0 #8ec5fc, 0 0 0 15px rgba(168,237,234,0); }
            100% { box-shadow: 0 6px 0 #8ec5fc, 0 0 0 0 rgba(168,237,234,0); }
        }

        /* 订单与提示区域 */
        .order-board {
            background: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 22px;
            margin-bottom: 15px;
            border: 4px solid #ffdfba;
            box-shadow: 0 6px 0 #ffb3ba;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #ff8b94;
        }

        /* 妹妹的控制区 */
        .sister-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
        }

        /* 大大的“请”按钮 */
        #please-btn {
            font-size: 26px;
            padding: 15px 30px;
            background-color: #ffb3ba;
            color: white;
            border: 4px solid #ff9e9e;
            border-radius: 30px;
            box-shadow: 0 8px 0 #ff9e9e;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.1s;
        }

        #please-btn:active:not(.disabled) {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent;
        }

        #please-btn.disabled {
            background-color: #e0e0e0;
            border-color: #bdbdbd;
            box-shadow: 0 8px 0 #9e9e9e;
            cursor: not-allowed;
            color: #9e9e9e;
        }

        /* 搅拌碗 */
        .mixing-bowl {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            border: 5px solid #ffb3ba;
            box-shadow: 0 8px 0 #ff9e9e, inset 0 5px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .shadow-hint {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        /* 传送带里的物品 */
        #transfer-item {
            font-size: 55px;
            cursor: pointer;
            transition: transform 0.3s;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        #transfer-item:active {
            transform: scale(1.2);
        }

        /* 顾客（屏幕中间侧边，面向两人） */
        #customer {
            position: absolute;
            left: 20px;
            font-size: 65px;
            transform: rotate(90deg);
            animation: float 2.5s ease-in-out infinite;
        }
        
        /* 状态提示文字 */
        .status-msg {
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            height: 28px;
            margin-top: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 烘焙大按钮（两人同时按） */
        .bake-btn {
            font-size: 24px;
            padding: 15px 30px;
            background-color: #ffdfba;
            color: #ff8b94;
            border: 4px solid #ffb3ba;
            border-radius: 20px;
            box-shadow: 0 8px 0 #ffb3ba;
            font-weight: bold;
            font-family: inherit;
            display: none;
            transition: all 0.1s;
        }
        .bake-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 transparent;
        }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅️ 返回菜单</a>
    <div class="music-btn off" id="music-toggle" onclick="toggleMusic()">🔇</div>

    <!-- 哥哥的区域 -->
    <div id="brother-zone">
        <h2>🧑 哥哥的食材库 (仓库管理员)</h2>
        <div class="order-board" id="brother-order">
            当前订单: 🍰 = 🥞 + 🥛 + 🍓
        </div>
        <div class="ingredients-grid" id="brother-ingredients">
            <!-- 食材由JS动态生成 -->
        </div>
        <div class="status-msg" id="brother-msg">等待妹妹的礼貌请求...</div>
        <button class="bake-btn" id="brother-bake-btn">🔥 一起烘焙！(按住)</button>
    </div>

    <!-- 中间传送带 -->
    <div id="transfer-zone">
        <div id="customer">🐶</div>
        <div id="transfer-item"></div>
    </div>

    <!-- 妹妹的区域 -->
    <div id="sister-zone">
        <h2>👧 妹妹的料理台 (魔法点心师)</h2>
        <div class="order-board" id="sister-order">
            当前订单: 🍰 = 🥞 + 🥛 + 🍓
        </div>
        <div class="sister-controls">
            <div class="mixing-bowl" id="mixing-bowl">
                <span class="shadow-hint" id="bowl-hint">🥞</span>
            </div>
            <button id="please-btn">✨ 请给我</button>
        </div>
        <div class="status-msg" id="sister-msg">按下“请”按钮，向哥哥要食材</div>
        <button class="bake-btn" id="sister-bake-btn">🔥 一起烘焙！(按住)</button>
    </div>

    <script>
        // 游戏数据
        const recipes = [
            { result: '🍰', resultName: '草莓蛋糕', ingredients: ['🥞', '🥛', '🍓'], customer: '🐶' },
            { result: '🍩', resultName: '巧克力甜甜圈', ingredients: ['🥞', '🍫', '🍬'], customer: '🐱' },
            { result: '🍧', resultName: '水果刨冰', ingredients: ['🧊', '🍓', '🍇'], customer: '🐰' }
        ];

        const allIngredients = ['🥞', '🥛', '🍓', '🍫', '🍬', '🧊', '🍇'];

        // 游戏状态
        let currentRecipeIndex = 0;
        let currentStep = 0; // 当前需要配方的第几个食材
        let isPoliteRequested = false; // 妹妹是否已经按了“请”
        let itemInTransfer = null; // 传送带上是否有物品

        // DOM 元素
        const brotherIngredientsDiv = document.getElementById('brother-ingredients');
        const brotherMsg = document.getElementById('brother-msg');
        const sisterMsg = document.getElementById('sister-msg');
        const pleaseBtn = document.getElementById('please-btn');
        const bowlHint = document.getElementById('bowl-hint');
        const transferItem = document.getElementById('transfer-item');
        const brotherOrder = document.getElementById('brother-order');
        const sisterOrder = document.getElementById('sister-order');
        const customer = document.getElementById('customer');
        const brotherBakeBtn = document.getElementById('brother-bake-btn');
        const sisterBakeBtn = document.getElementById('sister-bake-btn');

        // 音效生成器 (使用 Web Audio API 生成简单的电子音效，避免需要外部音频文件)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playPoliteSound() { playTone(600, 'sine', 0.2); setTimeout(() => playTone(800, 'sine', 0.4), 200); }
        function playErrorSound() { playTone(200, 'sawtooth', 0.3); }
        function playSuccessSound() { playTone(500, 'square', 0.1); setTimeout(() => playTone(700, 'square', 0.2), 100); }
        function playWinSound() { playTone(400, 'sine', 0.1); setTimeout(() => playTone(500, 'sine', 0.1), 100); setTimeout(() => playTone(600, 'sine', 0.4), 200); }

        // 初始化一局游戏
        function initGame() {
            const recipe = recipes[currentRecipeIndex];
            currentStep = 0;
            isPoliteRequested = false;
            itemInTransfer = null;
            transferItem.innerText = '';
            
            // 更新订单显示
            const orderText = `订单: ${recipe.result} = ${recipe.ingredients.join(' + ')}`;
            brotherOrder.innerText = orderText;
            sisterOrder.innerText = orderText;
            customer.innerText = recipe.customer;

            // 隐藏烘焙按钮
            brotherBakeBtn.style.display = 'none';
            sisterBakeBtn.style.display = 'none';
            pleaseBtn.style.display = 'block';

            updateUI();
            renderBrotherIngredients();
        }

        // 渲染哥哥的食材
        function renderBrotherIngredients() {
            brotherIngredientsDiv.innerHTML = '';
            allIngredients.forEach(ing => {
                const el = document.createElement('div');
                el.className = 'ingredient locked'; // 默认全锁定
                el.innerText = ing;
                
                // 哥哥点击食材
                el.addEventListener('mousedown', () => handleBrotherClick(ing, el));
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleBrotherClick(ing, el); });
                
                brotherIngredientsDiv.appendChild(el);
            });
            updateBrotherLocks();
        }

        // 更新哥哥食材的发光/锁定状态
        function updateBrotherLocks() {
            const recipe = recipes[currentRecipeIndex];
            const targetIng = recipe.ingredients[currentStep];
            const els = brotherIngredientsDiv.children;
            
            for(let i=0; i<els.length; i++) {
                const el = els[i];
                const ing = el.innerText;
                
                if (isPoliteRequested && ing === targetIng && !itemInTransfer) {
                    el.className = 'ingredient active'; // 需要这个且妹妹已经请求
                } else {
                    el.className = 'ingredient locked';
                }
            }
        }

        // 更新 UI 提示
        function updateUI() {
            const recipe = recipes[currentRecipeIndex];
            
            if (currentStep >= recipe.ingredients.length) {
                // 食材齐全，准备烘焙
                bowlHint.innerText = '🍲';
                bowlHint.className = '';
                sisterMsg.innerText = "食材齐啦！和哥哥一起按烘焙！";
                brotherMsg.innerText = "食材齐啦！和妹妹一起按烘焙！";
                pleaseBtn.style.display = 'none';
                brotherBakeBtn.style.display = 'block';
                sisterBakeBtn.style.display = 'block';
                return;
            }

            const targetIng = recipe.ingredients[currentStep];
            bowlHint.innerText = targetIng;
            bowlHint.className = 'shadow-hint';

            if (itemInTransfer) {
                pleaseBtn.classList.add('disabled');
                sisterMsg.innerText = "食材在传送带上，快拿下来！";
                brotherMsg.innerText = "等待妹妹拿走食材...";
            } else if (!isPoliteRequested) {
                pleaseBtn.classList.remove('disabled');
                sisterMsg.innerText = "按下“请”按钮，向哥哥要食材";
                brotherMsg.innerText = "等待妹妹的礼貌请求...";
            } else {
                pleaseBtn.classList.add('disabled');
                sisterMsg.innerText = "已经请求啦，等哥哥给你~";
                brotherMsg.innerText = `妹妹想要 ${targetIng}，快放到传送带上！`;
            }
            
            updateBrotherLocks();
        }

        // 妹妹按“请”按钮
        function handlePlease() {
            if (isPoliteRequested || itemInTransfer || currentStep >= recipes[currentRecipeIndex].ingredients.length) {
                playErrorSound();
                return;
            }
            
            playPoliteSound();
            isPoliteRequested = true;
            updateUI();
        }

        pleaseBtn.addEventListener('mousedown', handlePlease);
        pleaseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handlePlease(); });

        // 哥哥给食材
        function handleBrotherClick(ing, el) {
            const recipe = recipes[currentRecipeIndex];
            const targetIng = recipe.ingredients[currentStep];

            if (itemInTransfer) {
                showError(el, "传送带满了！");
                return;
            }

            if (!isPoliteRequested) {
                showError(el, "妹妹还没有说“请”哦！");
                return;
            }

            if (ing !== targetIng) {
                showError(el, "顾客现在不需要这个！");
                return;
            }

            // 正确操作：放入传送带
            playSuccessSound();
            itemInTransfer = ing;
            transferItem.innerText = ing;
            isPoliteRequested = false; // 重置请求状态
            updateUI();
        }

        function showError(el, msg) {
            playErrorSound();
            brotherMsg.innerText = msg;
            el.classList.add('shake');
            setTimeout(() => {
                el.classList.remove('shake');
                updateUI(); // 恢复提示
            }, 400);
        }

        // 妹妹从传送带拿食材
        function handleTakeItem() {
            if (!itemInTransfer) return;
            
            playSuccessSound();
            // 放入碗中的小动画效果（这里简化为直接更新状态）
            itemInTransfer = null;
            transferItem.innerText = '';
            currentStep++;
            updateUI();
        }

        transferItem.addEventListener('mousedown', handleTakeItem);
        transferItem.addEventListener('touchstart', (e) => { e.preventDefault(); handleTakeItem(); });

        // 共同烘焙机制（需要两人同时按住）
        let brotherBaking = false;
        let sisterBaking = false;

        let recipesCompleted = 0;

        function checkBake() {
            if (brotherBaking && sisterBaking) {
                // 成功完成当前点心！
                playWinSound();
                bowlHint.innerText = recipes[currentRecipeIndex].result;
                bowlHint.className = '';
                sisterMsg.innerText = "太棒啦！点心做好了！";
                brotherMsg.innerText = "合作愉快！";
                customer.innerText = '🤩';
                
                recipesCompleted++;
                
                setTimeout(() => {
                    if (recipesCompleted >= 2) {
                        // 通关！记录进度并返回主菜单
                        let progress = parseInt(localStorage.getItem('niceTryProgress')) || 0;
                        if (progress < 1) {
                            localStorage.setItem('niceTryProgress', 1); // 解锁第二关
                        }
                        alert("🎉 恭喜你们完成了第一关！你们合作得非常棒！妹妹学会了礼貌请求，哥哥也很大度！现在去挑战第二关吧！");
                        window.location.href = 'index.html';
                    } else {
                        // 继续下一个点心
                        currentRecipeIndex = (currentRecipeIndex + 1) % recipes.length;
                        initGame();
                    }
                }, 2000);
            }
        }

        // 哥哥按键事件
        brotherBakeBtn.addEventListener('mousedown', () => { brotherBaking = true; checkBake(); });
        brotherBakeBtn.addEventListener('mouseup', () => { brotherBaking = false; });
        brotherBakeBtn.addEventListener('mouseleave', () => { brotherBaking = false; });
        brotherBakeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); brotherBaking = true; checkBake(); });
        brotherBakeBtn.addEventListener('touchend', (e) => { e.preventDefault(); brotherBaking = false; });

        // 妹妹按键事件
        sisterBakeBtn.addEventListener('mousedown', () => { sisterBaking = true; checkBake(); });
        sisterBakeBtn.addEventListener('mouseup', () => { sisterBaking = false; });
        sisterBakeBtn.addEventListener('mouseleave', () => { sisterBaking = false; });
        sisterBakeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); sisterBaking = true; checkBake(); });
        sisterBakeBtn.addEventListener('touchend', (e) => { e.preventDefault(); sisterBaking = false; });

        // 防止整个页面的双击缩放和滚动
        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        // 启动游戏
        initGame();

        // ====== 背景音乐生成器: 《粉刷匠》 ======
        let bgmCtx;
        let isPlayingBgm = false;
        let bgmInterval;

        const C4 = 261.6, D4 = 293.7, E4 = 329.6, F4 = 349.2, G4 = 392.0, A4 = 440.0;
        const melodyBgm = [
            // 我是一个粉刷匠 (5 3 5 3 5 3 1)
            {f: G4, d: 0.5}, {f: E4, d: 0.5}, {f: G4, d: 0.5}, {f: E4, d: 0.5},
            {f: G4, d: 0.5}, {f: E4, d: 0.5}, {f: C4, d: 1.0},
            // 粉刷本领强 (2 4 3 2 5 -)
            {f: D4, d: 0.5}, {f: F4, d: 0.5}, {f: E4, d: 0.5}, {f: D4, d: 0.5},
            {f: G4, d: 1.5}, {f: 0, d: 0.5},
            // 我要把那新房子 (5 3 5 3 5 3 1)
            {f: G4, d: 0.5}, {f: E4, d: 0.5}, {f: G4, d: 0.5}, {f: E4, d: 0.5},
            {f: G4, d: 0.5}, {f: E4, d: 0.5}, {f: C4, d: 1.0},
            // 刷得很漂亮 (2 4 3 2 1 -)
            {f: D4, d: 0.5}, {f: F4, d: 0.5}, {f: E4, d: 0.5}, {f: D4, d: 0.5},
            {f: C4, d: 1.5}, {f: 0, d: 0.5}
        ];

        function playBgmNote(frequency, duration, startTime) {
            if (!bgmCtx || frequency === 0) return;
            const osc = bgmCtx.createOscillator();
            const gain = bgmCtx.createGain();
            
            osc.type = 'triangle'; // 三角波，有点像电子琴/八音盒，欢快一点
            osc.frequency.setValueAtTime(frequency, startTime);
            
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.08, startTime + 0.05); // 音量稍轻，不盖过游戏音效
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration - 0.05);
            
            osc.connect(gain);
            gain.connect(bgmCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function playBgmLoop() {
            if (!isPlayingBgm) return;
            
            const now = bgmCtx.currentTime;
            let timeOffset = 0;
            const tempo = 0.5; // 播放速度
            
            melodyBgm.forEach(note => {
                playBgmNote(note.f, note.d * tempo, now + timeOffset);
                timeOffset += note.d * tempo;
            });
            
            bgmInterval = setTimeout(playBgmLoop, (timeOffset + 0.5) * 1000);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-toggle');
            if (!bgmCtx) { bgmCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (bgmCtx.state === 'suspended') { bgmCtx.resume(); }

            isPlayingBgm = !isPlayingBgm;
            if (isPlayingBgm) {
                btn.classList.remove('off');
                btn.innerText = '🎵';
                playBgmLoop();
            } else {
                btn.classList.add('off');
                btn.innerText = '🔇';
                clearTimeout(bgmInterval);
            }
        }

    </script>
</body>
</html>
